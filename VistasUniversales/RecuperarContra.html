<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6">
<main class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo/Header Placeholder based on Brand Anchor text -->
<div class="mb-12 text-center">
<p class="text-on-surface-variant text-sm font-medium tracking-wide">GESTIÓN ACADÉMICA</p>
</div>
<!-- Form Card using Surface Hierarchy -->
<div class="w-full bg-surface-container-lowest p-10 rounded-xl shadow-sm shadow-primary/5">
<div class="mb-8">
<h2 class="text-xl font-bold text-primary tracking-tight mb-3">Recuperar acceso</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">
                    Introduce tu correo electrónico institucional. Te enviaremos las instrucciones para restablecer tu contraseña.
                </p>
</div>
<form id="recuperarForm" class="space-y-6">
<!-- Input Field: Minimalist Style -->
<div class="space-y-2">
<label class="block text-[10px] font-bold uppercase tracking-[0.05em] text-outline" for="email">
                        Correo Institucional
                    </label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-on-surface focus:ring-0 focus:ring-offset-0 transition-all border-b-2 border-transparent focus:border-primary placeholder:text-outline-variant text-sm" id="email" placeholder="usuario@academia.edu" required="" type="email"/>
</div>
</div>
<!-- Primary Button: Gradient Fill -->
<button class="w-full intellectual-gradient text-white font-bold py-3.5 rounded-md text-sm transition-opacity hover:opacity-90 active:scale-[0.98] duration-200" type="submit">
                    Enviar instrucciones
                </button>
</form>
<!-- Footer Link: Tertiary Style -->
<div class="mt-10 flex justify-center">
<a class="inline-flex items-center gap-2 text-primary text-xs font-bold uppercase tracking-widest hover:text-secondary-container transition-colors duration-300" href="LoginGeneral.html">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Volver al login
                </a>
</div>
</div>
<!-- Semantic Footer / Meta Information -->
<footer class="mt-12 text-center">
<p class="text-[10px] text-outline-variant font-medium uppercase tracking-[0.1em]">
                © 2024 AcademiaAtelier • Sistema de Seguridad
            </p>
</footer>
</main>
<script>
document.getElementById('recuperarForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value;

  try {
    const response = await fetch('http://localhost:3000/api/recuperar-contrasena', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        correo: email
      })
    });

    if (response.ok) {
      const data = await response.json();
      alert('✓ Se ha enviado una nueva contraseña a tu correo.\n\nIngresa el correo y la contraseña temporal para iniciar sesión.');
      window.location.href = 'LoginGeneral.html';
    } else {
      const error = await response.json();
      alert('Error: ' + error.error);
    }
  } catch (error) {
    alert('Error de conexión: ' + error.message);
  }
});
</script>
