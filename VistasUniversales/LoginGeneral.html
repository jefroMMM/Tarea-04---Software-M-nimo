<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6">
<main class="w-full max-w-[440px]">
<!-- Container for the login experience -->
<div class="bg-surface-container-lowest editorial-shadow rounded-xl overflow-hidden p-8 md:p-12 transition-all duration-300">
<!-- Logo Placeholder -->
<div class="flex justify-center mb-10">
<div class="w-16 h-16 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="account_balance">account_balance</span>
</div>
</div>
<!-- Login Header -->
<header class="text-center mb-10">
<h1 class="text-3xl font-extrabold tracking-tight text-primary mb-2">Inicio de Sesión</h1>
</header>
<!-- Login Form -->
<form id="loginForm" class="space-y-8" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-[0.05em] font-bold text-on-surface-variant px-1" for="email">
                        Correo
                    </label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 transition-all border-b-2 border-transparent focus:border-primary" id="email" name="email" placeholder="nombre@universidad.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="block text-[10px] uppercase tracking-[0.05em] font-bold text-on-surface-variant" for="password">
                            Contraseña
                        </label>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 transition-all border-b-2 border-transparent focus:border-primary" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex justify-end pt-1">
<a class="text-xs font-medium text-primary hover:text-secondary transition-colors duration-200" href="RecuperarContra.html">
                            ¿Olvidaste tu contraseña?
                        </a>
</div>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="w-full primary-gradient text-on-primary py-4 rounded-md font-bold text-sm tracking-[0.05em] uppercase shadow-lg shadow-primary/10 hover:shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all duration-300" type="submit">
                        Entrar
                    </button>
</div>
</form>
</div>
<!-- Footer Branding (Minimal) -->
<footer class="mt-8 text-center">
<p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-semibold">
                Reserva Académica
            </p>
</footer>
</main>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  try {
    const response = await fetch('http://localhost:3000/api/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        correo: email,
        contrasena: password
      })
    });

    if (response.ok) {
      const data = await response.json();
      const rol = data.usuario.rol;

      // Guardar datos del usuario
      localStorage.setItem('usuario', JSON.stringify(data.usuario));

      // Redirigir según rol
      if (rol === 'Estudiante') {
        window.location.href = '../VistasEstudiante/ReservaEstudiantes.html';
      } else if (rol === 'Profesor' || rol === 'Administrador') {
        window.location.href = '../VistasAdmin/DashboardAdmin.html';
      } else {
        alert('Rol no reconocido');
      }
    } else {
      const error = await response.json();
      alert('Error: ' + error.error);
    }
  } catch (error) {
    alert('Error de conexión: ' + error.message);
  }
});
</script>
</body></html>
